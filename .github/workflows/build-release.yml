name: Build & Release

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download Identity2 dependency
        run: |
          mkdir -p libs
          curl -L -o libs/identity2.jar \
            "https://cdn.modrinth.com/data/u8V1OwVf/versions/TEBIrp8U/identity2-fabric-1.3.1.jar"

      - name: Build
        run: ./gradlew build

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'mod_version' gradle.properties | cut -d= -f2)
          MC=$(grep 'minecraft_version' gradle.properties | cut -d= -f2)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=v${VERSION}+mc${MC}-${SHA}" >> "$GITHUB_OUTPUT"
          echo "name=Flashback Knavish Compats ${VERSION} for MC ${MC}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: build/libs/flashback-*[!s].jar
          generate_release_notes: true
